name: CI

on:
  push:
    branches: [master]
  pull_request:

permissions:
  contents: read

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: ${{ github.event_name == 'pull_request' }}

jobs:
  lint:
    name: Lint (${{ matrix.goos }})
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        goos: [linux, darwin, windows]
    steps:
      - name: Checkout
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7

      - name: Setup Go
        uses: actions/setup-go@b7ad1dad31e06c5925ef5d2fc7ad053ef454303e # v7
        with:
          go-version: '1.26.5'
          cache: true

      # golangci-lint only analyses the files built for the active GOOS, so lint
      # every target: otherwise the whole darwin backend (every file is
      # //go:build darwin) would never be checked on the ubuntu runner.
      - name: golangci-lint
        uses: golangci/golangci-lint-action@ba0d7d2ec06a0ea1cb5fa41b2e4a3ab91d21278a # v9
        with:
          version: v2.12.2
          args: --timeout=5m
        env:
          GOOS: ${{ matrix.goos }}

      - name: markdownlint
        if: matrix.goos == 'linux'
        uses: DavidAnson/markdownlint-cli2-action@8de2aa07cae85fd17c0b35642db70cf5495f1d25 # v24
        with:
          globs: '**/*.md'

  cross-compile:
    name: Build ${{ matrix.goos }}/${{ matrix.goarch }} (CGO off)
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        include:
          - { goos: darwin, goarch: arm64 }
          - { goos: darwin, goarch: amd64 }
          - { goos: linux, goarch: amd64 }
          - { goos: linux, goarch: arm64 }
          - { goos: windows, goarch: amd64 }
          - { goos: windows, goarch: arm64 }
          - { goos: freebsd, goarch: amd64 }
          - { goos: openbsd, goarch: amd64 }
          - { goos: netbsd, goarch: amd64 }
          - { goos: dragonfly, goarch: amd64 }
    steps:
      - name: Checkout
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7

      - name: Setup Go
        uses: actions/setup-go@b7ad1dad31e06c5925ef5d2fc7ad053ef454303e # v7
        with:
          go-version: '1.26.5'
          cache: true

      # The library must cross-compile to every target with cgo disabled. This
      # is the load-bearing "no cgo, ever" check — if a backend sneaks in a C
      # dependency, this job goes red.
      - name: Build
        env:
          CGO_ENABLED: '0'
          GOOS: ${{ matrix.goos }}
          GOARCH: ${{ matrix.goarch }}
        run: go build ./...

  unit-test:
    name: Unit tests (${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          # The race detector needs a C toolchain, which the Linux and macOS
          # runners ship. The Windows runner still runs the full suite, just
          # without -race; Windows race coverage rides on the integration job
          # once that backend lands.
          - { os: ubuntu-latest, race: '-race' }
          - { os: macos-latest, race: '-race' }
          - { os: windows-latest, race: '' }
    steps:
      - name: Checkout
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7

      - name: Setup Go
        uses: actions/setup-go@b7ad1dad31e06c5925ef5d2fc7ad053ef454303e # v7
        with:
          go-version: '1.26.5'
          cache: true

      # bash on every runner (Git Bash on Windows) so the coverage flags parse
      # identically; PowerShell splits -coverprofile=coverage.out at the dot.
      - name: Test
        shell: bash
        run: go test ${{ matrix.race }} -coverprofile=coverage.out -covermode=atomic ./...

      - name: Upload coverage
        uses: codecov/codecov-action@fb8b3582c8e4def4969c97caa2f19720cb33a72f # v7
        with:
          files: ./coverage.out
          flags: unittests-${{ matrix.os }}
          token: ${{ secrets.CODECOV_TOKEN }}
          fail_ci_if_error: false

  integration-macos:
    name: Integration (macOS)
    runs-on: macos-latest
    steps:
      - name: Checkout
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7

      - name: Setup Go
        uses: actions/setup-go@b7ad1dad31e06c5925ef5d2fc7ad053ef454303e # v7
        with:
          go-version: '1.26.5'
          cache: true

      # The integration tests mutate a real keychain, so point them at a
      # throwaway one (empty password, no auto-lock) made the default and the
      # sole search-list entry — the runner's login keychain is never touched.
      - name: Create a temporary unlocked keychain
        run: |
          KEYCHAIN="$RUNNER_TEMP/keychain-integration.keychain-db"
          security create-keychain -p "" "$KEYCHAIN"
          security set-keychain-settings "$KEYCHAIN"
          security unlock-keychain -p "" "$KEYCHAIN"
          security default-keychain -s "$KEYCHAIN"
          security list-keychains -d user -s "$KEYCHAIN"

      # The full behavioural contract on the real store: both macOS backends
      # (native Security.framework and the security-CLI opt-in), the 16 KB
      # payload, the cross-process read, and the cross-identity CLI read.
      - name: Integration tests
        run: go test -tags keychain_integration -coverprofile=coverage.out -covermode=atomic -coverpkg=./... ./...

      - name: Upload coverage
        uses: codecov/codecov-action@fb8b3582c8e4def4969c97caa2f19720cb33a72f # v7
        with:
          files: ./coverage.out
          flags: integration-macos
          token: ${{ secrets.CODECOV_TOKEN }}
          fail_ci_if_error: false

      # Re-run under the reference counter to prove no CoreFoundation ref leaks.
      - name: CoreFoundation leak check
        run: go test -tags 'keychain_integration keychain_cfdebug' ./...

  integration-windows:
    name: Integration (Windows)
    runs-on: windows-latest
    steps:
      - name: Checkout
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7

      - name: Setup Go
        uses: actions/setup-go@b7ad1dad31e06c5925ef5d2fc7ad053ef454303e # v7
        with:
          go-version: '1.26.5'
          cache: true

      # Credential Manager is per-user and needs no setup on the runner. The
      # contract's 16 KB payload exercises the chunk container across several
      # 2560-byte blobs; unique throwaway service names avoid clobbering.
      - name: Integration tests
        shell: bash
        run: go test -tags keychain_integration -coverprofile=coverage.out -covermode=atomic -coverpkg=./... ./...

      - name: Upload coverage
        uses: codecov/codecov-action@fb8b3582c8e4def4969c97caa2f19720cb33a72f # v7
        with:
          files: ./coverage.out
          flags: integration-windows
          token: ${{ secrets.CODECOV_TOKEN }}
          fail_ci_if_error: false

  integration-linux:
    name: Integration (Linux)
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7

      - name: Setup Go
        uses: actions/setup-go@b7ad1dad31e06c5925ef5d2fc7ad053ef454303e # v7
        with:
          go-version: '1.26.5'
          cache: true

      - name: Install gnome-keyring and dbus
        run: |
          sudo apt-get update
          sudo apt-get install -y gnome-keyring dbus-x11

      # dbus-run-session gives a hermetic session bus (no X11). With no keyring
      # files present, piping a non-empty password to `gnome-keyring-daemon
      # --unlock` creates the login keyring, unlocks it, and aliases it as the
      # default collection — the state the backend needs. An empty password does
      # not set up the default alias, so the value is non-empty on purpose.
      - name: Integration tests
        run: |
          dbus-run-session -- bash -c '
            rm -rf "$HOME/.local/share/keyrings"
            echo -n "keychain-ci" | gnome-keyring-daemon --unlock --components=secrets
            go test -tags keychain_integration -coverprofile=coverage.out -covermode=atomic -coverpkg=./... ./...
          '

      - name: Upload coverage
        uses: codecov/codecov-action@fb8b3582c8e4def4969c97caa2f19720cb33a72f # v7
        with:
          files: ./coverage.out
          flags: integration-linux
          token: ${{ secrets.CODECOV_TOKEN }}
          fail_ci_if_error: false

  integration-freebsd:
    name: Integration (FreeBSD)
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7

      # A real FreeBSD VM (QEMU) proves the godbus + Secret Service path runs at
      # runtime on a BSD, not merely that it cross-compiles. The gnome-keyring and
      # dbus setup mirrors the Linux job; printf keeps the password newline-free in
      # the VM's POSIX sh. The FreeBSD go package may lag, so GOTOOLCHAIN fetches
      # the version go.mod pins.
      - name: Integration tests in a FreeBSD VM
        uses: vmactions/freebsd-vm@5a72679103d223925653750faa878a143340fbd0 # v1.5.0
        with:
          usesh: true
          prepare: |
            pkg install -y go gnome-keyring dbus
          run: |
            export GOTOOLCHAIN=auto
            dbus-run-session -- sh -c '
              rm -rf "$HOME/.local/share/keyrings"
              printf "keychain-ci" | gnome-keyring-daemon --unlock --components=secrets
              go test -tags keychain_integration ./...
            '

  integration-openbsd:
    name: Integration (OpenBSD)
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7

      # Same runtime check on OpenBSD: its godbus syscalls differ from FreeBSD's,
      # so this exercises them against gnome-keyring. pkg_add is non-interactive.
      - name: Integration tests in an OpenBSD VM
        uses: vmactions/openbsd-vm@c941015845c0f0c429676840963dc63b226d4f69 # v1.4.5
        with:
          usesh: true
          prepare: |
            pkg_add -I go gnome-keyring dbus
          run: |
            export GOTOOLCHAIN=auto
            dbus-run-session -- sh -c '
              rm -rf "$HOME/.local/share/keyrings"
              printf "keychain-ci" | gnome-keyring-daemon --unlock --components=secrets
              go test -tags keychain_integration ./...
            '

  integration-netbsd:
    name: Integration (NetBSD)
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7

      # The third BSD syscall variant. pkgsrc ships Go under a version-suffixed
      # name that needs the pkg_alternatives symlink, so install the official
      # NetBSD build of the exact version instead; gnome-keyring and dbus still
      # come from pkgsrc.
      - name: Integration tests in a NetBSD VM
        uses: vmactions/netbsd-vm@0c26a4c4a5e234038862a4a53a00c905b8a107c9 # v1.4.2
        with:
          usesh: true
          prepare: |
            /usr/sbin/pkg_add gnome-keyring dbus curl
          run: |
            curl -L -o /tmp/go.tgz https://dl.google.com/go/go1.26.4.netbsd-amd64.tar.gz
            mkdir -p /usr/local
            tar -C /usr/local -xzf /tmp/go.tgz
            export PATH="/usr/local/go/bin:/usr/pkg/bin:$PATH"
            dbus-run-session -- sh -c '
              rm -rf "$HOME/.local/share/keyrings"
              printf "keychain-ci" | gnome-keyring-daemon --unlock --components=secrets
              go test -tags keychain_integration ./...
            '

  vulncheck:
    name: Vulnerabilities
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7

      - name: Setup Go
        uses: actions/setup-go@b7ad1dad31e06c5925ef5d2fc7ad053ef454303e # v7
        with:
          go-version: '1.26.5'
          cache: true

      # A secret store should not ship on a dependency with a known vulnerability.
      # govulncheck reports only vulns actually reachable from this module's code.
      - name: govulncheck
        run: go run golang.org/x/vuln/cmd/govulncheck@latest ./...

  fuzz:
    name: Fuzz (chunk)
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7

      - name: Setup Go
        uses: actions/setup-go@b7ad1dad31e06c5925ef5d2fc7ad053ef454303e # v7
        with:
          go-version: '1.26.5'
          cache: true

      # The chunk container is the format-parsing core; fuzz it briefly on every
      # run so a boundary or offset regression surfaces as a saved crasher.
      - name: Fuzz the chunk round trip
        run: go test -run '^$' -fuzz FuzzRoundTrip -fuzztime 40s ./internal/chunk/
