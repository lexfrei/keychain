name: CI

on:
  push:
    branches: [master]
  pull_request:

permissions:
  contents: read

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: ${{ github.event_name == 'pull_request' }}

jobs:
  lint:
    name: Lint (${{ matrix.goos }})
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        goos: [linux, darwin, windows]
    steps:
      - name: Checkout
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7

      - name: Setup Go
        uses: actions/setup-go@924ae3a1cded613372ab5595356fb5720e22ba16 # v6
        with:
          go-version: '1.26.4'
          cache: true

      # golangci-lint only analyses the files built for the active GOOS, so lint
      # every target: otherwise the whole darwin backend (every file is
      # //go:build darwin) would never be checked on the ubuntu runner.
      - name: golangci-lint
        uses: golangci/golangci-lint-action@ba0d7d2ec06a0ea1cb5fa41b2e4a3ab91d21278a # v9
        with:
          version: v2.12.2
          args: --timeout=5m
        env:
          GOOS: ${{ matrix.goos }}

      - name: markdownlint
        if: matrix.goos == 'linux'
        uses: DavidAnson/markdownlint-cli2-action@ded1f9488f68a970bc66ea5619e13e9b52e601cd # v23
        with:
          globs: '**/*.md'

  cross-compile:
    name: Build ${{ matrix.goos }}/${{ matrix.goarch }} (CGO off)
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        include:
          - { goos: darwin, goarch: arm64 }
          - { goos: darwin, goarch: amd64 }
          - { goos: linux, goarch: amd64 }
          - { goos: linux, goarch: arm64 }
          - { goos: windows, goarch: amd64 }
          - { goos: windows, goarch: arm64 }
          - { goos: freebsd, goarch: amd64 }
          - { goos: openbsd, goarch: amd64 }
          - { goos: netbsd, goarch: amd64 }
          - { goos: dragonfly, goarch: amd64 }
    steps:
      - name: Checkout
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7

      - name: Setup Go
        uses: actions/setup-go@924ae3a1cded613372ab5595356fb5720e22ba16 # v6
        with:
          go-version: '1.26.4'
          cache: true

      # The library must cross-compile to every target with cgo disabled. This
      # is the load-bearing "no cgo, ever" check — if a backend sneaks in a C
      # dependency, this job goes red.
      - name: Build
        env:
          CGO_ENABLED: '0'
          GOOS: ${{ matrix.goos }}
          GOARCH: ${{ matrix.goarch }}
        run: go build ./...

  unit-test:
    name: Unit tests (${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          # The race detector needs a C toolchain, which the Linux and macOS
          # runners ship. The Windows runner still runs the full suite, just
          # without -race; Windows race coverage rides on the integration job
          # once that backend lands.
          - { os: ubuntu-latest, race: '-race' }
          - { os: macos-latest, race: '-race' }
          - { os: windows-latest, race: '' }
    steps:
      - name: Checkout
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7

      - name: Setup Go
        uses: actions/setup-go@924ae3a1cded613372ab5595356fb5720e22ba16 # v6
        with:
          go-version: '1.26.4'
          cache: true

      # bash on every runner (Git Bash on Windows) so the coverage flags parse
      # identically; PowerShell splits -coverprofile=coverage.out at the dot.
      - name: Test
        shell: bash
        run: go test ${{ matrix.race }} -coverprofile=coverage.out -covermode=atomic ./...

      - name: Upload coverage
        uses: codecov/codecov-action@fb8b3582c8e4def4969c97caa2f19720cb33a72f # v7
        with:
          files: ./coverage.out
          flags: unittests-${{ matrix.os }}
          token: ${{ secrets.CODECOV_TOKEN }}
          fail_ci_if_error: false

  integration-macos:
    name: Integration (macOS)
    runs-on: macos-latest
    steps:
      - name: Checkout
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7

      - name: Setup Go
        uses: actions/setup-go@924ae3a1cded613372ab5595356fb5720e22ba16 # v6
        with:
          go-version: '1.26.4'
          cache: true

      # The integration tests mutate a real keychain, so point them at a
      # throwaway one (empty password, no auto-lock) made the default and the
      # sole search-list entry — the runner's login keychain is never touched.
      - name: Create a temporary unlocked keychain
        run: |
          KEYCHAIN="$RUNNER_TEMP/keychain-integration.keychain-db"
          security create-keychain -p "" "$KEYCHAIN"
          security set-keychain-settings "$KEYCHAIN"
          security unlock-keychain -p "" "$KEYCHAIN"
          security default-keychain -s "$KEYCHAIN"
          security list-keychains -d user -s "$KEYCHAIN"

      # The full behavioural contract on the real store: both macOS backends
      # (native Security.framework and the security-CLI opt-in), the 16 KB
      # payload, the cross-process read, and the cross-identity CLI read.
      - name: Integration tests
        run: go test -tags keychain_integration ./...

      # Re-run under the reference counter to prove no CoreFoundation ref leaks.
      - name: CoreFoundation leak check
        run: go test -tags 'keychain_integration keychain_cfdebug' ./...

  integration-windows:
    name: Integration (Windows)
    runs-on: windows-latest
    steps:
      - name: Checkout
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7

      - name: Setup Go
        uses: actions/setup-go@924ae3a1cded613372ab5595356fb5720e22ba16 # v6
        with:
          go-version: '1.26.4'
          cache: true

      # Credential Manager is per-user and needs no setup on the runner. The
      # contract's 16 KB payload exercises the chunk container across several
      # 2560-byte blobs; unique throwaway service names avoid clobbering.
      - name: Integration tests
        shell: bash
        run: go test -tags keychain_integration ./...
